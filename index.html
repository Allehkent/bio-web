<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Web Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="bio-container">
        <header class="profile-header">
            <div class="avatar-wrapper">
                <img src="https://via.placeholder.com/150" alt="Profile Picture" class="profile-avatar">
            </div>
            <h1 class="profile-name">Alex Kent</h1>
            <p class="profile-bio">Digital Creator & Web Developer</p>
        </header>

        <main class="links-grid">
            <a href="#" class="grid-item" aria-label="GitHub">
                <i class="fab fa-github item-icon"></i>
                <span class="item-label">GitHub</span>
            </a>
            <a href="#" class="grid-item" aria-label="LinkedIn">
                <i class="fab fa-linkedin-in item-icon"></i>
                <span class="item-label">LinkedIn</span>
            </a>
            <a href="#" class="grid-item" aria-label="Twitter">
                <i class="fab fa-x-twitter item-icon"></i>
                <span class="item-label">Twitter</span>
            </a>
            <a href="#" class="grid-item" aria-label="YouTube">
                <i class="fab fa-youtube item-icon"></i>
                <span class="item-label">YouTube</span>
            </a>
            <a href="#" class="grid-item" aria-label="Portfolio">
                <i class="fas fa-laptop-code item-icon"></i>
                <span class="item-label">Portfolio</span>
            </a>
            <a href="#" class="grid-item" aria-label="Resume">
                <i class="fas fa-file-alt item-icon"></i>
                <span class="item-label">Resume</span>
            </a>
            <a href="#" class="grid-item" aria-label="Email">
                <i class="fas fa-envelope item-icon"></i>
                <span class="item-label">Email</span>
            </a>
            <a href="#" class="grid-item" aria-label="Discord">
                <i class="fab fa-discord item-icon"></i>
                <span class="item-label">Discord</span>
            </a>
        </main>

        <footer class="bio-footer">
            <p>&copy; 2026 Allehkent. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
